name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Upload site artifact
        uses: actions/upload-artifact@v6
        with:
          name: site
          path: |
            index.html
            style.css
            script.js
