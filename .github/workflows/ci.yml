name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: |
            index.html
            style.css
            script.js
